<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyTag Expert Bot</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .chat-box { border: 1px solid #ddd; padding: 1rem; border-radius: 8px; background: #f9f9f9; min-height: 200px; margin-bottom: 1rem; }
        .user-msg { color: #555; font-style: italic; }
        .bot-msg { color: #2c3e50; font-weight: bold; white-space: pre-wrap; }
        textarea { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>EnergyTag AI Assistant</h1>
    
    <div class="chat-box">
        {% if bot_reply %}
            <p class="user-msg"><strong>You:</strong> {{ user_input }}</p>
            <p class="bot-msg"><strong>Bot:</strong> {{ bot_reply }}</p>
        {% else %}
            <p>Ask me anything about the EnergyTag Standard!</p>
        {% endif %}
    </div>

    <form method="POST">
        <textarea name="message" rows="3" placeholder="Type your question here..." required></textarea>
        <button type="submit">Send Message</button>
    </form>
</body>
</html>
