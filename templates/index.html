<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EnergyTag Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { color: #2c3e50; }
    #chatbox { border: 1px solid #ccc; padding: 10px; width: 400px; height: 300px; overflow-y: auto; margin-bottom: 10px; }
    #userInput { width: 300px; padding: 5px; }
    button { padding: 5px 10px; }
    .user { color: blue; margin: 5px 0; }
    .bot { color: green; margin: 5px 0; }
  </style>
</head>
<body>
  <h1>EnergyTag Chatbot</h1>
  <div id="chatbox"></div>
  <input id="userInput" type="text" placeholder="Ask me something...">
  <button onclick="sendMessage()">Send</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value;
      if (!message) return;

      // Show user message
      const chatbox = document.getElementById("chatbox");
      chatbox.innerHTML += "<div class='user'><b>You:</b> " + message + "</div>";

      // Send to backend
      const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
      });

      const data = await response.json();

      // Show bot response
      chatbox.innerHTML += "<div class='bot'><b>Bot:</b> " + data.response + "</div>";

      // Clear input
      input.value = "";
      chatbox.scrollTop = chatbox.scrollHeight;
    }
  </script>
</body>
</html>
