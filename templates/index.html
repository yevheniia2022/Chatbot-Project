<!DOCTYPE html>
<html>
<head>
    <title>EnergyTag Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F5F5F5;
            color: #212121;
            text-align: center;
            padding: 40px;
        }
        h1 {
            color: #2E7D32;
        }
        form {
            margin: 20px 0;
        }
        input[type="text"] {
            padding: 10px;
            width: 300px;
            border: 2px solid #1565C0;
            border-radius: 5px;
        }
        button {
            background-color: #1565C0;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2E7D32;
        }
        .chat-box {
            margin-top: 30px;
            padding: 20px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: inline-block;
            text-align: left;
            max-width: 600px;
        }
        .user {
            color: #1565C0;
            font-weight: bold;
        }
        .bot {
            color: #2E7D32;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>EnergyTag Chatbot</h1>
    <form method="POST">
        <input type="text" name="message" placeholder="Ask me something about EnergyTag">
        <button type="submit">Send</button>
    </form>

    {% if user_input %}
    <div class="chat-box">
        <p><span class="user">You:</span> {{ user_input }}</p>
        <p><span class="bot">Bot:</span> {{ bot_reply }}</p>
    </div>
    {% endif %}
</body>
</html>
