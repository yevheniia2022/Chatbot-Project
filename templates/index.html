<!DOCTYPE html>
<html>
<head>
    <title>EnergyTag Chatbot</title>
</head>
<body>
    <h1>EnergyTag Chatbot</h1>
    <form method="POST">
        <input type="text" name="message" placeholder="Ask me something about EnergyTag">
        <button type="submit">Send</button>
    </form>

    {% if user_input %}
    <div>
        <p><strong>You:</strong> {{ user_input }}</p>
        <p><strong>Bot:</strong> {{ bot_reply }}</p>
    </div>
    {% endif %}
</body>
</html>
